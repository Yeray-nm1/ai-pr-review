name: 'AI PR Reviewer'
description: 'AI-based PR reviewer for Astro + React + TypeScript projects'

inputs:
  groq_api_key:
    description: 'Groq API Key'
    required: true
  groq_model:
    description: 'Groq model name'
    required: false
    default: 'llama-3.1-8b-instant'
  mode:
    description: 'Review mode (frontend | fullstack)'
    required: false
    default: 'frontend'

runs:
  using: 'composite'
  steps:
    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install --omit=dev

    - name: Run AI reviewer
      shell: bash
      working-directory: ${{ github.action_path }}
      run: node index.js
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        INPUT_GROQ_API_KEY: ${{ inputs.groq_api_key }}
        INPUT_GROQ_MODEL: ${{ inputs.groq_model }}
        INPUT_MODE: ${{ inputs.mode }}
